{% extends "base.html" %}

{% block title %}Novo Serviço{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="page-title mb-1">Novo Serviço</h1>
    <p class="page-subtitle mb-0">Cadastre um novo serviço</p>
</div>

<div class="card premium-card">
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Cliente</label>
                <input type="text" name="cliente" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Veículo</label>
                <input type="text" name="veiculo" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Tipo de Serviço</label>
                <input type="text" name="tipo_servico" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Valor</label>
                <input type="text" name="valor" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Status</label>
                <select name="status" class="form-select" required>
                    <option value="Pendente">Pendente</option>
                    <option value="Em andamento">Em andamento</option>
                    <option value="Concluído">Concluído</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Agendamento Vinculado</label>
                <select name="agendamento_id" class="form-select">
                    <option value="">Sem vínculo</option>
                    {% for agendamento in agendamentos %}
                    <option value="{{ agendamento.id }}">
                        #{{ agendamento.id }} - {{ agendamento.cliente }} / {{ agendamento.veiculo }} / {{ agendamento.servico }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Salvar</button>
                <a href="{{ url_for('servicos') }}" class="btn btn-secondary">Voltar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
