{% extends "base.html" %}

{% block titulo %}Editar Veículo{% endblock %}

{% block conteudo %}

<h2 class="mb-4">Editar Veículo</h2>

{% if veiculo %}
<form>
    <div class="mb-3">
        <label class="form-label">Cliente</label>
        <input type="text" class="form-control" value="{{ veiculo.cliente }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Modelo</label>
        <input type="text" class="form-control" value="{{ veiculo.modelo }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Marca</label>
        <input type="text" class="form-control" value="{{ veiculo.marca }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Placa</label>
        <input type="text" class="form-control" value="{{ veiculo.placa }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Cor</label>
        <input type="text" class="form-control" value="{{ veiculo.cor }}">
    </div>

    <button class="btn btn-warning">Atualizar</button>
    <a href="/veiculos" class="btn btn-secondary">Voltar</a>
</form>
{% else %}
    <p class="text-danger">Veículo não encontrado.</p>
    <a href="/veiculos" class="btn btn-secondary">Voltar</a>
{% endif %}

{% endblock %}
