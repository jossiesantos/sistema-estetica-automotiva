{% extends "base.html" %}

{% block title %}Editar Serviço{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="page-title mb-1">Editar Serviço</h1>
    <p class="page-subtitle mb-0">Atualize os dados do serviço</p>
</div>

<div class="card premium-card">
    <div class="card-body p-4">
        {% if servico %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Cliente</label>
                <input type="text" name="cliente" class="form-control" value="{{ servico.cliente }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Veículo</label>
                <input type="text" name="veiculo" class="form-control" value="{{ servico.veiculo }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Tipo de Serviço</label>
                <input type="text" name="tipo_servico" class="form-control" value="{{ servico.tipo_servico }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Valor</label>
                <input type="text" name="valor" class="form-control" value="{{ servico.valor }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Status</label>
                <select name="status" class="form-select" required>
                    <option value="Pendente" {% if servico.status == 'Pendente' %}selected{% endif %}>Pendente</option>
                    <option value="Em andamento" {% if servico.status == 'Em andamento' %}selected{% endif %}>Em andamento</option>
                    <option value="Concluído" {% if servico.status == 'Concluído' %}selected{% endif %}>Concluído</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Agendamento Vinculado</label>
                <select name="agendamento_id" class="form-select">
                    <option value="">Sem vínculo</option>
                    {% for agendamento in agendamentos %}
                    <option value="{{ agendamento.id }}" {% if servico.agendamento_id == agendamento.id %}selected{% endif %}>
                        #{{ agendamento.id }} - {{ agendamento.cliente }} / {{ agendamento.veiculo }} / {{ agendamento.servico }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning">Atualizar</button>
                <a href="{{ url_for('servicos') }}" class="btn btn-secondary">Voltar</a>
            </div>
        </form>
        {% else %}
            <p class="text-danger mb-3">Serviço não encontrado.</p>
            <a href="{{ url_for('servicos') }}" class="btn btn-secondary">Voltar</a>
        {% endif %}
    </div>
</div>
{% endblock %}
