{% extends "base.html" %}

{% block title %}Editar Veículo{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="page-title mb-1">Editar Veículo</h1>
    <p class="page-subtitle mb-0">Atualize os dados do veículo</p>
</div>

<div class="card premium-card">
    <div class="card-body p-4">
        {% if veiculo %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Cliente</label>
                <input type="text" name="cliente" class="form-control" value="{{ veiculo.cliente }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Modelo</label>
                <input type="text" name="modelo" class="form-control" value="{{ veiculo.modelo }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Marca</label>
                <input type="text" name="marca" class="form-control" value="{{ veiculo.marca }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Placa</label>
                <input type="text" name="placa" class="form-control" value="{{ veiculo.placa }}" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Cor</label>
                <input type="text" name="cor" class="form-control" value="{{ veiculo.cor }}" required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning">Atualizar</button>
                <a href="{{ url_for('veiculos') }}" class="btn btn-secondary">Voltar</a>
            </div>
        </form>
        {% else %}
            <p class="text-danger mb-3">Veículo não encontrado.</p>
            <a href="{{ url_for('veiculos') }}" class="btn btn-secondary">Voltar</a>
        {% endif %}
    </div>
</div>
{% endblock %}
