<!DOCTYPE html>
<html>
<head>
    <title>Registro de Serviços</title>
</head>
<body>

<h1>Registro de Serviços</h1>

<form>
    <label>Cliente:</label><br>
    <input type="text" name="cliente"><br><br>

    <label>Veículo:</label><br>
    <input type="text" name="veiculo"><br><br>

    <label>Tipo de Serviço:</label><br>
    <input type="text" name="tipo_servico"><br><br>

    <label>Valor:</label><br>
    <input type="text" name="valor"><br><br>

    <label>Status:</label><br>
    <select name="status">
        <option value="Pendente">Pendente</option>
        <option value="Em andamento">Em andamento</option>
        <option value="Concluído">Concluído</option>
    </select><br><br>

    <button type="submit">Salvar</button>
</form>

<br>

<a href="/">Voltar para o início</a>

</body>
</html>
