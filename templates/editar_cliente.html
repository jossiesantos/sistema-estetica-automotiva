{% extends "base.html" %}

{% block titulo %}Editar Cliente{% endblock %}

{% block conteudo %}

<h2 class="mb-4">Editar Cliente</h2>

{% if cliente %}
<form>
    <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" class="form-control" value="{{ cliente.nome }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Telefone</label>
        <input type="text" class="form-control" value="{{ cliente.telefone }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" value="{{ cliente.email }}">
    </div>

    <button class="btn btn-warning">Atualizar</button>
    <a href="/clientes" class="btn btn-secondary">Voltar</a>
</form>
{% else %}
    <p class="text-danger">Cliente não encontrado.</p>
    <a href="/clientes" class="btn btn-secondary">Voltar</a>
{% endif %}

{% endblock %}
