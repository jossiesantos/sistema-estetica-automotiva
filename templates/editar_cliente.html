{% extends "base.html" %}

{% block title %}Editar Cliente{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="page-title mb-1">Editar Cliente</h1>
    <p class="page-subtitle mb-0">Atualize os dados do cliente</p>
</div>

<div class="card premium-card">
    <div class="card-body p-4">
        {% if cliente %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nome</label>
                <input type="text" name="nome" class="form-control" value="{{ cliente.nome }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Telefone</label>
                <input type="text" name="telefone" class="form-control" value="{{ cliente.telefone }}" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">E-mail</label>
                <input type="email" name="email" class="form-control" value="{{ cliente.email }}" required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning">Atualizar</button>
                <a href="{{ url_for('clientes') }}" class="btn btn-secondary">Voltar</a>
            </div>
        </form>
        {% else %}
            <p class="text-danger mb-3">Cliente não encontrado.</p>
            <a href="{{ url_for('clientes') }}" class="btn btn-secondary">Voltar</a>
        {% endif %}
    </div>
</div>
{% endblock %}
