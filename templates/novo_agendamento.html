{% extends "base.html" %}

{% block title %}Novo Agendamento{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="page-title mb-1">Novo Agendamento</h1>
    <p class="page-subtitle mb-0">Cadastre um novo agendamento</p>
</div>

<div class="card premium-card">
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Cliente</label>
                <input type="text" name="cliente" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Veículo</label>
                <input type="text" name="veiculo" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Serviço</label>
                <input type="text" name="servico" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Data</label>
                <input type="date" name="data" class="form-control" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Hora</label>
                <input type="time" name="hora" class="form-control" required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Salvar</button>
                <a href="{{ url_for('agendamentos') }}" class="btn btn-secondary">Voltar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
